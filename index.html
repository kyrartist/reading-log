<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading Log</title>

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="book-popup.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="confirmation-popup" class="hidden">
      <div id="confirmation-content">
        <h2>Are you sure you want to delete this book?</h2>
        <div id="confirmation-buttons">
          <button id="confirm-delete-btn">Yes, Delete</button>
          <button id="cancel-delete-btn">Cancel</button>
        </div>
      </div>
    </div>

    <div id="book-popup">
      <div id="popup">
        <button id="close-popup-btn"><i class="bi bi-x"></i></button>
        <div class="info-container"></div>
        <h2>Reviews</h2>
        <button>Add Review</button>
        <div class="reviews-container"></div>
      </div>
    </div>
    <section id="side-bar">
      <h1>Reading Log</h1>
      <form id="add-book-form" action="">
        <legend>Add a book to the shelf!</legend>
        <label for="title">Title: </label>
        <input type="text" id="title" name="title" required />
        <label for="author">Author: </label>
        <input type="text" id="author" name="author" required />
        <label for="rating">Rating: </label>
        <input
          id="rating"
          name="rating"
          type="number"
          min="0"
          max="5"
          step="0.25"
          required
        />
        <button type="submit" id="add-btn">Add Book</button>
      </form>
    </section>

    <div id="main-body">
      <div id="top-bar">
        <input id="search-input" type="text" placeholder="Search for books" />
        <button id="search-btn" type="submit">Search</button>
      </div>
      <h2>Bookshelf</h2>
      <div id="book-container"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
