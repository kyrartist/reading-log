<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading Log</title>

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="book-popup" class="hidden">
      <button id="close-popup-btn">X</button>
    </div>
    <section id="side-bar">
      <h1>Reading Log</h1>
      <form id="add-book-form" action="">
        <legend>Add a book to the shelf!</legend>
        <label for="title">Title: </label>
        <input type="text" id="title" name="title" required />
        <label for="author">Author: </label>
        <input type="text" id="author" name="author" required />
        <label for="rating">Rating: </label>
        <input
          id="rating"
          name="rating"
          type="number"
          min="0"
          max="5"
          step="0.25"
          required
        />
        <label for="review">Review: </label>
        <textarea name="review" id="review" rows="5"></textarea>
        <button type="submit" id="add-btn">Add Book</button>
      </form>
    </section>

    <div id="main-body">
      <nav>
        <input id="search-input" type="text" placeholder="Search for books" />
        <button id="search-btn" type="submit">
          <span><i class="bi bi-search"></i></span> Search
        </button>
      </nav>
      <h2>Finished</h2>
      <div id="book-container"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
