<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading Log</title>

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="book-popup" class="hidden"></div>
    <section id="side-bar">
      <h1>Reading Log</h1>
      <form id="add-book-form" action="">
        <legend>Add a book to the shelf!</legend>
        <label for="title">Title: </label>
        <input type="text" id="title" name="title" required />
        <label for="author">Author: </label>
        <input type="text" id="author" name="author" required />
        <label for="rating">Rating: </label>
        <input
          id="rating"
          name="rating"
          type="number"
          min="0"
          max="5"
          step="0.25"
          required
        />
        <label for="review">Review: </label>
        <textarea name="review" id="review" rows="5"></textarea>
        <button type="submit" id="add-btn">Add Book</button>
      </form>
    </section>

    <div id="main-body">
      <nav>
        <input id="search-input" type="text" placeholder="Search for books" />
        <button id="search-btn" type="submit">
          <span><i class="bi bi-search"></i></span> Search
        </button>
      </nav>
      <h2>Finished</h2>
      <div id="book-container">
        <div class="book-card">
          <img
            src="https://dboyle93.wordpress.com/wp-content/uploads/2014/05/the_road-large.jpg"
            alt=""
          />
          <h2 class="book-title">The Road</h2>
          <p class="author">Cormac McCarthy</p>
          <p class="rating">
            <i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i
            ><i class="bi bi-star-fill"></i><i class="bi bi-star-fill"></i
            ><i class="bi bi-star"></i>
          </p>
        </div>
        <div class="book-card">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTfNUSCOQtB1FXUCUqq0guKeYvAI_5ZQDq5yw&s"
            alt=""
          />
          <h2 class="book-title">Bone Ships</h2>
          <p class="author">R. J. Barker</p>
        </div>
        <div class="book-card">
          <img
            src="https://m.media-amazon.com/images/I/71jIvFJGf9L._AC_UF1000,1000_QL80_.jpg"
            alt=""
          />
          <h2 class="book-title">I Who Have Never Known Men</h2>
          <p class="author">Jacqueline Harpman</p>
        </div>
        <div class="book-card">
          <img
            src="https://mpd-biblio-covers.imgix.net/9781250824042.jpg"
            alt=""
          />
          <h2 class="book-title">Annihilation</h2>
          <p class="author">Jeff VanderMeer</p>
        </div>
        <div class="book-card">
          <img
            src="https://m.media-amazon.com/images/I/71dxf9f04rL._AC_UF1000,1000_QL80_.jpg"
            alt=""
          />
          <h2 class="book-title">Red Rising</h2>
          <p class="author">Pierce Brown</p>
        </div>
        <div class="book-card">
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSR9tzE1svqrg82F1tV4bamFhp5IpQ9jxSjOg&s"
            alt=""
          />
          <h2 class="book-title">Project Hail Mary</h2>
          <p class="author">Andy Weir</p>
        </div>
        <div class="book-card">
          <img
            src="https://m.media-amazon.com/images/I/81zMrlJIgDL._AC_UF1000,1000_QL80_.jpg"
            alt=""
          />
          <h2 class="book-title">The Backyard Bird Chronicles</h2>
          <p class="author">Amy Tan</p>
        </div>
        <div class="book-card">
          <img
            src="https://m.media-amazon.com/images/S/compressed.photo.goodreads.com/books/1670752670i/40874032.jpg"
            alt=""
          />
          <h2 class="book-title">Vicious</h2>
          <p class="author">V. E. Schwab</p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
